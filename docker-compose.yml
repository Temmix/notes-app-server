services:
  postgres:
    image: postgres:16
    container_name: notes-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
      POSTGRES_DB: notes_dev
    ports:
      - "5433:5432"
    volumes:
      - notes_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notes_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  notes_pgdata:
